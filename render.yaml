services:
  - type: web
    name: website-rag-backend
    env: python
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: VECTOR_STORE_PATH
        value: "/data/vector_store"
      - key: CORS_ORIGINS
        value: "https://your-vercel-domain.vercel.app,http://localhost:3000"
    disk:
      name: faiss-storage
      mountPath: /data
      sizeGB: 1
